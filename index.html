<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈神器 - 智能图片压缩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --primary-light: #e6f0ff;
            --secondary: #00d4ff;
            --success: #00c853;
            --warning: #ff6b35;
            --danger: #ff3b30;
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --bg-hover: #252d4a;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #2d3748;
            --shadow: 0 20px 60px rgba(0, 102, 255, 0.1);
            --shadow-hover: 0 30px 80px rgba(0, 102, 255, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1535 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .card {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 102, 255, 0.05);
        }

        .upload-zone:hover::before {
            opacity: 1;
        }

        .upload-zone.dragover {
            border-color: var(--secondary);
            background: rgba(0, 212, 255, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        .upload-zone h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .upload-zone p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .settings-panel h3 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .info-box {
            background: rgba(0, 102, 255, 0.1);
            border-left: 3px solid var(--primary);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .files-section {
            margin-top: 40px;
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .files-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .files-list {
            display: grid;
            gap: 12px;
        }

        .file-item {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        .file-item:hover {
            border-color: var(--primary);
            background: rgba(26, 31, 58, 0.95);
        }

        .file-item.processing {
            opacity: 0.7;
        }

        .file-item.completed {
            border-color: var(--success);
        }

        .file-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-name {
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }

        .file-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .file-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-processing {
            background: rgba(255, 107, 53, 0.2);
            color: var(--warning);
        }

        .status-completed {
            background: rgba(0, 200, 83, 0.2);
            color: var(--success);
        }

        .status-error {
            background: rgba(255, 59, 48, 0.2);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-primary);
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            max-width: 300px;
        }

        .toast.success {
            border-left: 3px solid var(--success);
        }

        .toast.error {
            border-left: 3px solid var(--danger);
        }

        .toast.warning {
            border-left: 3px solid var(--warning);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            .card {
                padding: 20px;
            }

            .file-item {
                grid-template-columns: auto 1fr;
                gap: 12px;
            }

            .file-actions {
                grid-column: 2;
                justify-self: end;
            }

            .files-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .batch-actions {
                width: 100%;
            }

            .batch-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .toast {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 朋友圈神器</h1>
            <p>智能图片压缩 · 一键优化 · 完美分享</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">总文件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">原始大小</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="compressedSize">0 MB</div>
                <div class="stat-label">压缩后</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="compressionRate">0%</div>
                <div class="stat-label">压缩率</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">📸</div>
                    <h3>选择或拖拽图片</h3>
                    <p>支持 JPG、PNG、WebP 等格式</p>
                    <p style="font-size: 12px; color: var(--text-secondary);">单个文件 ≤ 100MB</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>

            <div class="card">
                <div class="settings-panel">
                    <h3>⚙️ 压缩设置</h3>
                    <div class="info-box">
                        <strong>📋 压缩规则：</strong><br>
                        • 长边 = 1600px<br>
                        • 短边按比例自动缩放<br>
                        • 不裁切，保留完整内容<br>
                        • 强制转换为 JPG<br>
                        • 文件大小 1-1.5MB
                    </div>
                </div>
            </div>
        </div>

        <div class="files-section">
            <div class="files-header">
                <h3>📁 文件列表</h3>
                <div class="batch-actions">
                    <button class="btn btn-primary" id="compressAllBtn" disabled>
                        <span>⚡ 全部压缩</span>
                    </button>
                    <button class="btn btn-success" id="downloadAllBtn" disabled>
                        <span>⬇️ 全部下载</span>
                    </button>
                    <button class="btn btn-danger" id="clearAllBtn" disabled>
                        <span>🗑️ 清空列表</span>
                    </button>
                </div>
            </div>
            <div class="files-list" id="filesList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>还没有选择图片，上传开始吧！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            files: []
        };

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const compressAllBtn = document.getElementById('compressAllBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        function initEventListeners() {
            uploadZone.addEventListener('click', () => fileInput.click());
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });

            compressAllBtn.addEventListener('click', () => compressAll());
            downloadAllBtn.addEventListener('click', () => downloadAll());
            clearAllBtn.addEventListener('click', () => clearAll());
        }

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => {
                if (!file.type.startsWith('image/')) {
                    showToast('只支持图片文件', 'error');
                    return false;
                }
                if (file.size > 100 * 1024 * 1024) {
                    showToast(`${file.name} 超过 100MB 限制`, 'error');
                    return false;
                }
                return true;
            });

            newFiles.forEach(file => {
                const fileObj = {
                    id: Date.now() + Math.random(),
                    file: file,
                    name: file.name,
                    size: file.size,
                    compressedSize: null,
                    status: 'pending',
                    progress: 0,
                    compressedBlob: null,
                    selected: false
                };
                state.files.push(fileObj);
            });

            renderFilesList();
            updateStats();
            updateButtonStates();
        }

        function renderFilesList() {
            if (state.files.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>还没有选择图片，上传开始吧！</p>
                    </div>
                `;
                return;
            }

            filesList.innerHTML = state.files.map(fileObj => `
                <div class="file-item ${fileObj.status === 'processing' ? 'processing' : ''} ${fileObj.status === 'completed' ? 'completed' : ''}">
                    <input type="checkbox" class="file-checkbox" data-id="${fileObj.id}" ${fileObj.selected ? 'checked' : ''}>
                    <div class="file-info">
                        <div class="file-name">${fileObj.name}</div>
                        <div class="file-meta">
                            <span>📦 ${formatSize(fileObj.size)}</span>
                            ${fileObj.compressedSize ? `<span>✅ ${formatSize(fileObj.compressedSize)}</span>` : ''}
                            ${fileObj.status === 'processing' ? `<span class="status-badge status-processing"><span class="spinner"></span>处理中</span>` : ''}
                            ${fileObj.status === 'completed' ? `<span class="status-badge status-completed">✓ 已完成</span>` : ''}
                            ${fileObj.status === 'error' ? `<span class="status-badge status-error">✗ 失败</span>` : ''}
                        </div>
                        ${fileObj.status === 'processing' ? `<div class="progress-bar"><div class="progress-fill" style="width: ${fileObj.progress}%"></div></div>` : ''}
                    </div>
                    <div class="file-actions">
                        ${fileObj.status === 'completed' ? `
                            <button class="btn btn-success btn-sm" onclick="downloadFile('${fileObj.id}')">⬇️ 下载</button>
                        ` : ''}
                        ${fileObj.status === 'pending' ? `
                            <button class="btn btn-primary btn-sm" onclick="compressFile('${fileObj.id}')">⚡ 压缩</button>
                        ` : ''}
                        <button class="btn btn-danger btn-sm" onclick="removeFile('${fileObj.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.file-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const fileObj = state.files.find(f => f.id == e.target.dataset.id);
                    if (fileObj) {
                        fileObj.selected = e.target.checked;
                        updateButtonStates();
                    }
                });
            });
        }

        async function compressFile(fileId) {
            const fileObj = state.files.find(f => f.id == fileId);
            if (!fileObj) return;

            fileObj.status = 'processing';
            renderFilesList();

            try {
                const compressedBlob = await compressImage(fileObj.file);
                fileObj.compressedBlob = compressedBlob;
                fileObj.compressedSize = compressedBlob.size;
                fileObj.status = 'completed';
                showToast(`${fileObj.name} 压缩成功！`, 'success');
            } catch (error) {
                fileObj.status = 'error';
                showToast(`${fileObj.name} 压缩失败: ${error.message}`, 'error');
            }

            renderFilesList();
            updateStats();
            updateButtonStates();
        }

        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        let { width, height } = img;
                        const targetLongSide = 1600;

                        let newWidth, newHeight;
                        if (width >= height) {
                            newWidth = targetLongSide;
                            newHeight = Math.round(height * (targetLongSide / width));
                        } else {
                            newHeight = targetLongSide;
                            newWidth = Math.round(width * (targetLongSide / height));
                        }

                        canvas.width = newWidth;
                        canvas.height = newHeight;
                        ctx.drawImage(img, 0, 0, width, height, 0, 0, newWidth, newHeight);

                        const TARGET_MIN = 1 * 1024 * 1024;
                        const TARGET_MAX = 1.5 * 1024 * 1024;

                        console.log(`📸 开始压缩: ${formatSize(file.size)}`);
                        console.log(`📐 缩放: ${newWidth}x${newHeight}`);
                        console.log(`📊 目标: ${formatSize(TARGET_MIN)} - ${formatSize(TARGET_MAX)}`);

                        const qualityLevels = [0.95, 0.90, 0.85, 0.80, 0.75, 0.70, 0.65, 0.60, 0.55, 0.50, 0.45, 0.40, 0.35, 0.30, 0.25, 0.20];
                        let currentIndex = 0;
                        let resolved = false;

                        const tryNextQuality = () => {
                            if (resolved || currentIndex >= qualityLevels.length) return;

                            const quality = qualityLevels[currentIndex];
                            console.log(`🔄 尝试质量: ${(quality * 100).toFixed(0)}%`);

                            canvas.toBlob(
                                (blob) => {
                                    const size = blob.size;
                                    console.log(`   结果: ${formatSize(size)}`);

                                    // 如果在目标范围内，立即返回
                                    if (size >= TARGET_MIN && size <= TARGET_MAX) {
                                        console.log(`✅ 完美！在目标范围内，立即返回`);
                                        resolved = true;
                                        resolve(blob);
                                        return;
                                    }

                                    // 如果太小（< 1MB），说明质量已经足够高，直接返回
                                    if (size < TARGET_MIN) {
                                        console.log(`✅ 已 < 1MB，质量足够，直接返回`);
                                        resolved = true;
                                        resolve(blob);
                                        return;
                                    }

                                    // 如果太大（> 1.5MB），继续降低质量
                                    if (size > TARGET_MAX) {
                                        console.log(`   太大，继续降低质量`);
                                        currentIndex++;
                                        tryNextQuality();
                                    }
                                },
                                'image/jpeg',
                                quality
                            );
                        };

                        tryNextQuality();
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        async function compressAll() {
            const pendingFiles = state.files.filter(f => f.status === 'pending');
            if (pendingFiles.length === 0) {
                showToast('没有待压缩的文件', 'warning');
                return;
            }

            for (const fileObj of pendingFiles) {
                await compressFile(fileObj.id);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }

        function downloadFile(fileId) {
            const fileObj = state.files.find(f => f.id == fileId);
            if (!fileObj || !fileObj.compressedBlob) return;

            const url = URL.createObjectURL(fileObj.compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileObj.name.replace(/\.[^.]+$/, '.jpg');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function downloadAll() {
            const completedFiles = state.files.filter(f => f.status === 'completed');
            if (completedFiles.length === 0) {
                showToast('没有已完成的文件', 'warning');
                return;
            }

            completedFiles.forEach((fileObj, index) => {
                setTimeout(() => downloadFile(fileObj.id), index * 200);
            });
        }

        function removeFile(fileId) {
            state.files = state.files.filter(f => f.id != fileId);
            renderFilesList();
            updateStats();
            updateButtonStates();
        }

        function clearAll() {
            state.files = [];
            renderFilesList();
            updateStats();
            updateButtonStates();
        }

        function updateStats() {
            const totalFiles = state.files.length;
            const totalSize = state.files.reduce((sum, f) => sum + f.size, 0);
            const compressedSize = state.files.reduce((sum, f) => sum + (f.compressedSize || 0), 0);
            const compressionRate = totalSize > 0 ? Math.round((1 - compressedSize / totalSize) * 100) : 0;

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalSize').textContent = formatSize(totalSize);
            document.getElementById('compressedSize').textContent = formatSize(compressedSize);
            document.getElementById('compressionRate').textContent = compressionRate + '%';
        }

        function updateButtonStates() {
            const hasPending = state.files.some(f => f.status === 'pending');
            const hasCompleted = state.files.some(f => f.status === 'completed');
            const hasFiles = state.files.length > 0;

            compressAllBtn.disabled = !hasPending;
            downloadAllBtn.disabled = !hasCompleted;
            clearAllBtn.disabled = !hasFiles;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        initEventListeners();
    </script>
</body>
</html>
